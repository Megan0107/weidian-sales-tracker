<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林国101角色海选 - 实时销量监控</title>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>🏆 林国101角色海选</h1>
            <p class="subtitle">实时销量监控系统</p>
            <div class="header-info">
                <span class="update-time">最后更新: <span id="lastUpdate">--</span></span>
                <span class="status-badge" id="statusBadge">● 运行中</span>
            </div>
        </header>

        <!-- 统计卡片 -->
        <section class="stats-section">
            <div class="stats-grid">
                <div class="stat-card primary">
                    <div class="stat-icon">📊</div>
                    <div class="stat-content">
                        <div class="stat-value" id="totalSales">0</div>
                        <div class="stat-label">总销量</div>
                    </div>
                </div>
                <div class="stat-card success">
                    <div class="stat-icon">👑</div>
                    <div class="stat-content">
                        <div class="stat-value" id="topSeller">--</div>
                        <div class="stat-label">当前冠军</div>
                    </div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-content">
                        <div class="stat-value" id="nextUpdate">60</div>
                        <div class="stat-label">下次更新(秒)</div>
                    </div>
                </div>
                <div class="stat-card info">
                    <div class="stat-icon">🎯</div>
                    <div class="stat-content">
                        <div class="stat-value">18</div>
                        <div class="stat-label">参选角色</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 实时排名 -->
        <section class="ranking-section">
            <div class="section-header">
                <h2>🏅 实时排名</h2>
                <button class="refresh-btn" onclick="manualRefresh()" id="refreshBtn">
                    🔄 立即刷新
                </button>
            </div>
            <div class="ranking-table-wrapper">
                <table class="ranking-table" id="rankingTable">
                    <thead>
                        <tr>
                            <th class="col-rank">排名</th>
                            <th class="col-name">角色名称</th>
                            <th class="col-sales">销量</th>
                            <th class="col-progress">进度</th>
                            <th class="col-stock">剩余库存</th>
                        </tr>
                    </thead>
                    <tbody id="rankingBody">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 图表区域 -->
        <section class="charts-section">
            <div class="chart-container">
                <div class="section-header">
                    <h2>📈 销量趋势</h2>
                    <div class="chart-controls">
                        <button class="time-btn active" data-hours="6">6小时</button>
                        <button class="time-btn" data-hours="12">12小时</button>
                        <button class="time-btn" data-hours="24">24小时</button>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </section>

        <!-- TOP5 对比 -->
        <section class="top5-section">
            <div class="section-header">
                <h2>🔥 TOP5 销量对比</h2>
            </div>
            <div class="chart-wrapper small">
                <canvas id="top5Chart"></canvas>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="footer">
            <p>微店销量监控系统 &copy; 2024 | 数据每60秒自动更新</p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script>
        // ============ 全局变量 ============
        let trendChart = null;
        let top5Chart = null;
        let countdownInterval = null;
        let autoRefreshInterval = null;
        let currentHours = 6;
        let lastData = null;

        // SKU颜色映射
        const skuColors = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7',
            '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9',
            '#F8C471', '#82E0AA', '#F1948A', '#85C1E9', '#D7BDE2',
            '#A9DFBF', '#F9E79F', '#AED6F1'
        ];

        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            loadData();
            startAutoRefresh();
            bindEvents();
        });

        // ============ 事件绑定 ============
        function bindEvents() {
            // 时间按钮点击事件
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentHours = parseInt(this.dataset.hours);
                    loadHistoryData();
                });
            });
        }

        // ============ 图表初始化 ============
        function initCharts() {
            // 趋势图表
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: []
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                padding: 15,
                                font: { size: 11 }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleFont: { size: 13 },
                            bodyFont: { size: 12 },
                            padding: 10,
                            cornerRadius: 8
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { font: { size: 11 } }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            ticks: { font: { size: 11 } }
                        }
                    }
                }
            });

            // TOP5图表
            const top5Ctx = document.getElementById('top5Chart').getContext('2d');
            top5Chart = new Chart(top5Ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: '销量',
                        data: [],
                        backgroundColor: skuColors.slice(0, 5),
                        borderRadius: 8,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { display: false }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(0,0,0,0.05)' }
                        }
                    }
                }
            });
        }

        // ============ 数据加载 ============
        async function loadData() {
            try {
                showLoading();
                
                // 并行加载当前数据和历史数据
                await Promise.all([
                    loadCurrentData(),
                    loadHistoryData()
                ]);
                
                updateLastUpdateTime();
                resetCountdown();
                
            } catch (error) {
                console.error('数据加载失败:', error);
                showError('数据加载失败，请稍后重试');
            } finally {
                hideLoading();
            }
        }

        async function loadCurrentData() {
            try {
                const response = await fetch('/api/current');
                const result = await response.json();
                
                if (result.success) {
                    lastData = result.data;
                    updateRankingTable(result.data);
                    updateStats(result);
                    updateTop5Chart(result.data);
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error('加载当前数据失败:', error);
            }
        }

        async function loadHistoryData() {
            try {
                const response = await fetch(`/api/history?hours=${currentHours}`);
                const result = await response.json();
                
                if (result.success) {
                    updateTrendChart(result.data);
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error('加载历史数据失败:', error);
            }
        }

        // ============ 更新UI ============
        function updateRankingTable(data) {
            const tbody = document.getElementById('rankingBody');
            tbody.innerHTML = '';
            
            data.forEach((item, index) => {
                const row = document.createElement('tr');
                const percentage = ((item.sales_count / 25000) * 100).toFixed(1);
                const rankClass = index < 3 ? `rank-${index + 1}` : '';
                
                row.innerHTML = `
                    <td class="col-rank">
                        <span class="rank-badge ${rankClass}">${item.rank}</span>
                    </td>
                    <td class="col-name">
                        <span class="sku-name">${item.sku_name}</span>
                    </td>
                    <td class="col-sales">
                        <span class="sales-count">${item.sales_count.toLocaleString()}</span>
                    </td>
                    <td class="col-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percentage}%; background-color: ${skuColors[index]}"></div>
                            <span class="progress-text">${percentage}%</span>
                        </div>
                    </td>
                    <td class="col-stock">${item.current_stock.toLocaleString()}</td>
                `;
                
                // 添加动画效果
                row.style.animationDelay = `${index * 0.05}s`;
                row.classList.add('fade-in');
                
                tbody.appendChild(row);
            });
        }

        function updateStats(result) {
            // 总销量
            animateNumber('totalSales', result.total_sales);
            
            // 冠军
            if (result.data && result.data.length > 0) {
                document.getElementById('topSeller').textContent = result.data[0].sku_name;
            }
        }

        function updateTrendChart(data) {
            if (!data || !data.timestamps || data.timestamps.length === 0) {
                console.warn('没有历史数据');
                return;
            }
            
            // 格式化时间标签
            const labels = data.timestamps.map(ts => {
                const date = new Date(ts);
                return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            });
            
            // 准备数据集 - 只显示前8名
            const datasets = [];
            const sortedSkuIds = Object.keys(data.sku_data)
                .map(id => ({
                    id: id,
                    total: data.sku_data[id].reduce((a, b) => a + b, 0)
                }))
                .sort((a, b) => b.total - a.total)
                .slice(0, 8);
            
            sortedSkuIds.forEach((item, index) => {
                const skuId = item.id;
                const skuName = data.sku_names[skuId] || `SKU_${skuId}`;
                
                datasets.push({
                    label: skuName,
                    data: data.sku_data[skuId],
                    borderColor: skuColors[index % skuColors.length],
                    backgroundColor: skuColors[index % skuColors.length] + '20',
                    borderWidth: 2,
                    pointRadius: 3,
                    pointHoverRadius: 5,
                    tension: 0.3,
                    fill: false
                });
            });
            
            trendChart.data.labels = labels;
            trendChart.data.datasets = datasets;
            trendChart.update('active');
        }

        function updateTop5Chart(data) {
            if (!data || data.length === 0) return;
            
            const top5 = data.slice(0, 5);
            
            top5Chart.data.labels = top5.map(item => item.sku_name);
            top5Chart.data.datasets[0].data = top5.map(item => item.sales_count);
            top5Chart.data.datasets[0].backgroundColor = skuColors.slice(0, 5);
            
            top5Chart.update('active');
        }

        // ============ 辅助函数 ============
        function animateNumber(elementId, targetValue) {
            const element = document.getElementById(elementId);
            const startValue = parseInt(element.textContent.replace(/,/g, '')) || 0;
            const duration = 1000;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // 缓动函数
                const easeOutQuart = 1 - Math.pow(1 - progress, 4);
                const currentValue = Math.floor(startValue + (targetValue - startValue) * easeOutQuart);
                
                element.textContent = currentValue.toLocaleString();
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

        function updateLastUpdateTime() {
            const now = new Date();
            const timeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            document.getElementById('lastUpdate').textContent = timeStr;
        }

        function startAutoRefresh() {
            // 每分钟自动刷新数据
            autoRefreshInterval = setInterval(loadData, 60000);
            
            // 倒计时
            countdownInterval = setInterval(() => {
                const countdownEl = document.getElementById('nextUpdate');
                let seconds = parseInt(countdownEl.textContent);
                if (seconds > 0) {
                    countdownEl.textContent = seconds - 1;
                }
            }, 1000);
        }

        function resetCountdown() {
            document.getElementById('nextUpdate').textContent = '60';
        }

        function manualRefresh() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 刷新中...';
            
            loadData().then(() => {
                btn.disabled = false;
                btn.textContent = '🔄 立即刷新';
            }).catch(() => {
                btn.disabled = false;
                btn.textContent = '🔄 立即刷新';
            });
        }

        function showLoading() {
            document.body.classList.add('loading');
        }

        function hideLoading() {
            document.body.classList.remove('loading');
        }

        function showError(message) {
            // 简单的错误提示
            const toast = document.createElement('div');
            toast.className = 'error-toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // ============ 页面可见性API ============
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                // 页面重新可见时刷新数据
                loadData();
            }
        });
    </script>
</body>
</html>
